version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/agent-support/vscode"
    target-branch: "main"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(vscode-plugin)"

  - package-ecosystem: "npm"
    directory: "/agent-support/opencode"
    target-branch: "main"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(opencode-plugin)"

  - package-ecosystem: "gradle"
    directory: "/agent-support/intellij"
    target-branch: "main"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(intellij-plugin)"
